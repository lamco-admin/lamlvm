# lamlvm CI — Tier 1 (baseline gate) + Tier 2 (no_std / fuzz / supply-chain).
# Derived from shared/integrated-development/templates/rust/github-ci.yml.
# Per Lamco Crate Standards (STANDARDS.md §3.4, §14).

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.85"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────── Tier 1: baseline mechanical gate ─────────────────────────
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo build --examples --all-features

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  # ───────────────────────── Tier 2: crate-specific rigor ─────────────────────────
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-features

  no-std:
    # lamlvm's reason to exist: a stray `std::` path fails to compile here even
    # though it would pass on the host.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --lib --no-default-features --target thumbv7em-none-eabihf

  deny:
    # Supply chain: advisories, license policy, banned/duplicate crates, sources.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  fuzz-smoke:
    # Adversarial input testing: lamlvm parses untrusted on-disk bytes, so each
    # target gets a brief run on every PR to surface crashes/OOM.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2     # prebuilt binary — reliable, no from-source git fetch
        with:
          tool: cargo-fuzz
      - name: smoke each fuzz target (60s)
        run: |
          for target in $(cargo fuzz list); do
            echo "::group::fuzz $target"
            cargo fuzz run "$target" -- -max_total_time=60 -rss_limit_mb=2048
            echo "::endgroup::"
          done
